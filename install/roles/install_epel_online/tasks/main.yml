---

- name: Test for yum command
  shell: command -v yum
  register: have_yum_raw
  ignore_errors: yes

- name: Set have_yum
  set_fact:
    have_yum: "{{ have_yum_raw.rc == 0 }}"

- name: Check if EPEL is installed with yum (RHEL/Centos)
  yum:
    name: epel-release
    state: installed
  register: have_epel_rpm_raw
  become: true
  ignore_errors: yes
  when:
    - have_rpm|bool

- name: Set have_epel_rpm (RHEL/Centos)
  set_fact:
    have_epel_rpm: "{{ 'epel-release is already installed' in have_epel_rpm_raw['results'][0] }}"
  when:
    - "'results' in have_epel_rpm_raw"

- name: Default have_epel_rpm (RHEL/Centos)
  set_fact:
    have_epel_rpm: false
  when:
    - have_epel_rpm is not defined

- name: Install EPEL for RHEL 6 from internet (RHEL/Centos 6)
  yum:
    name: https://dl.fedoraproject.org/pub/epel/epel-release-latest-6.noarch.rpm
    state: present
  become: true
  when:
    - is_rhel_centos_6|bool
    - not have_epel_rpm

- name: Install EPEL for RHEL 7 from internet (RHEL/Centos 7)
  yum:
    name: https://dl.fedoraproject.org/pub/epel/epel-release-latest-7.noarch.rpm
    state: present
  become: true
  when:
    - is_rhel_centos_7|bool
    - not have_epel_rpm
